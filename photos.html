    <main class="content photos-content">
      <h1>photos</h1>

        a few frames i'm fond of. more on

      <!--
        This gallery is generated. Drop images in /photos and run
        `python3 generate-photos.py` — it builds photos-data.js (with EXIF) and
        thumbnails, which this page reads. No HTML editing needed.
      -->
      <div class="photo-grid" id="photoGrid"></div>

      <p class="photo-empty" id="photoEmpty" hidden>
        no photos here yet — drop images in <code>/photos</code> and run
        <code>python3 generate-photos.py</code>.
      </p>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Photo viewer">
      <button class="lightbox-close" id="lbClose" aria-label="Close">&times;</button>
      <button class="lightbox-nav lightbox-prev" id="lbPrev" aria-label="Previous">&#8249;</button>
      <figure class="lightbox-figure">
        <img class="lightbox-img" id="lbImg" alt="" />
        <figcaption class="lightbox-meta" id="lbMeta"></figcaption>
      </figure>
      <button class="lightbox-nav lightbox-next" id="lbNext" aria-label="Next">&#8250;</button>
    </div>

    <footer>&copy; 2026 &middot; toronto &middot; ☾</footer>
    <script src="nav.js" defer></script>
    <script src="photos-data.js"></script>
    <script>
      (function () {
        var grid = document.getElementById("photoGrid");
        var empty = document.getElementById("photoEmpty");
        var lb = document.getElementById("lightbox");
        var lbImg = document.getElementById("lbImg");
        var lbMeta = document.getElementById("lbMeta");
        if (!grid || !lb) return;

        var photos = [];
        var current = -1;
        var ORDER = ["camera", "lens", "focal", "aperture", "shutter", "iso", "location", "date"];

        function metaLine(m) {
          if (!m) return "";
          var parts = [];
          ORDER.forEach(function (k) {
            if (m[k]) parts.push(m[k]);
          });
          return parts.join("  ·  ");
        }

        function show(i) {
          var n = photos.length;
          if (!n) return;
          i = ((i % n) + n) % n;
          current = i;
          var p = photos[i];
          lbImg.src = p.src;
          lbImg.alt = p.alt || "";
          var line = metaLine(p.meta);
          lbMeta.textContent = line;
          lbMeta.style.display = line ? "block" : "none";
        }

        function open(i) {
          show(i);
          lb.classList.add("open");
          lb.setAttribute("aria-hidden", "false");
          document.body.style.overflow = "hidden";
        }

        function close() {
          lb.classList.remove("open");
          lb.setAttribute("aria-hidden", "true");
          document.body.style.overflow = "";
          lbImg.src = "";
        }

        function render(data) {
          photos = data || [];
          if (!photos.length) {
            empty.hidden = false;
            return;
          }
          photos.forEach(function (p, i) {
            var fig = document.createElement("figure");
            fig.className = "photo-item";
            var img = document.createElement("img");
            img.src = p.thumb || p.src;
            img.alt = p.alt || "";
            img.loading = "lazy";
            img.decoding = "async";
            if (p.width && p.height) {
              img.style.aspectRatio = p.width + " / " + p.height;
            }
            img.style.cursor = "zoom-in";
            img.addEventListener("click", function () { open(i); });
            fig.appendChild(img);
            grid.appendChild(fig);
          });
        }

        render(window.PHOTOS || []);

        document.getElementById("lbClose").addEventListener("click", close);
        document.getElementById("lbNext").addEventListener("click", function (e) {
          e.stopPropagation();
          show(current + 1);
        });
        document.getElementById("lbPrev").addEventListener("click", function (e) {
          e.stopPropagation();
          show(current - 1);
        });
        lb.addEventListener("click", function (e) {
          if (e.target === lb || e.target.classList.contains("lightbox-figure")) close();
        });

        document.addEventListener("keydown", function (e) {
          if (!lb.classList.contains("open")) return;
          if (e.key === "Escape") close();
          else if (e.key === "ArrowRight") show(current + 1);
          else if (e.key === "ArrowLeft") show(current - 1);
        });
      })();
    </script>
