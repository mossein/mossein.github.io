    <script>
      var MY_PLAYLISTS = [
        "1yobC3D2VTxe02LapcyJld",
        "2jCoN6oQZ1H06xv56AUPVC",
        "0nenVcxWt26KhKrcklulUS",
        "6pvhcPB0KE1cDh9LnPQ9Kt",
        "3QSY42sTLZiaC2cETC4zvy",
        "4Gfpu5TwbcpseO6W9wYqz7",
      ];

      function getSpotifyTheme() {
        var r = document.documentElement;
        return r.classList.contains("dark") || r.classList.contains("watercolor") ? "1" : "0";
      }

      function initializePlaylists() {
        var grid = document.getElementById("playlist-grid");
        var theme = getSpotifyTheme();
        grid.innerHTML = MY_PLAYLISTS.map(function (id, i) {
          return '<div class="playlist-card playlist-stagger">'
            + '<iframe src="https://open.spotify.com/embed/playlist/' + id + '?utm_source=generator&theme=' + theme + '"'
            + ' width="100%" height="352" frameborder="0" allowfullscreen=""'
            + ' allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"'
            + (i < 2 ? '' : ' loading="lazy"') + '></iframe>'
            + '</div>';
        }).join("");

        // stagger on scroll
        var cards = document.querySelectorAll(".playlist-stagger");
        if ("IntersectionObserver" in window) {
          var obs = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add("playlist-visible");
                obs.unobserve(entry.target);
              }
            });
          }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });
          cards.forEach(function (card, i) {
            card.style.transitionDelay = (i * 0.08) + "s";
            obs.observe(card);
          });
        } else {
          cards.forEach(function (card) { card.classList.add("playlist-visible"); });
        }
      }

      initializePlaylists();
    </script>
